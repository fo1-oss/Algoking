name: AlgoKing Crypto Scanner

on:
  schedule:
    # 5:30 AM IST (00:00 UTC) — Overnight scan
    - cron: '0 0 * * 1-6'
    # 7:00 PM IST (13:30 UTC) — US market open
    - cron: '30 13 * * 1-5'
    # 11:00 PM IST (17:30 UTC) — Peak US hours
    - cron: '30 17 * * 0-5'
  workflow_dispatch: # Allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Run Crypto Scanner
        run: |
          echo "Running AlgoKing crypto scan..."
          RESULT=$(curl -s 'https://algomaster-pro.vercel.app/api/delta-scanner?action=scan&auto=true')
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          btc = d.get('btc', {})
          eth = d.get('eth', {})
          print(f'BTC: \${btc.get(\"price\",0):,.0f} | RSI: {btc.get(\"rsi\",0):.0f} | {btc.get(\"bias\",\"?\")}')
          print(f'ETH: \${eth.get(\"price\",0):,.0f} | RSI: {eth.get(\"rsi\",0):.0f} | {eth.get(\"bias\",\"?\")}')
          print(f'Signals >60%: {d.get(\"signalsAbove60\",0)} | >70%: {d.get(\"signalsAbove70\",0)}')
          print(f'Executed: {len(d.get(\"executed\",[]))}')
          " 2>/dev/null || echo "Scan completed"
